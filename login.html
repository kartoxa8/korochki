<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>Вход — Корочки.есть</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="header" id="app-header"></header>

    <main class="main">
      <div class="card card-narrow">
        <h1 class="card-title">Вход в систему</h1>
        <p class="page-subtitle" style="margin-bottom:18px;">
          Введите логин и пароль, чтобы продолжить.
        </p>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="label" for="login">Логин</label>
            <input
              class="input"
              id="login"
              name="login"
              autocomplete="username"
              placeholder="Например, student1"
            />
            <small class="field-error" data-error-for="login"></small>
          </div>

          <div class="form-group">
            <label class="label" for="password">Пароль</label>
            <input
              class="input"
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
            />
            <small class="field-error" data-error-for="password"></small>
          </div>

          <button class="btn btn-block" type="submit" id="submit-btn">Войти</button>

          <p class="form-footer">
            Еще не зарегистрированы?
            <a href="register.html">Регистрация</a>
          </p>
        </form>
      </div>
    </main>

    <footer class="footer" id="app-footer"></footer>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/validators.js"></script>
    <script>
      (function () {
        const Api = window.KorApi;
        const App = window.KorApp;
        const V = window.KorValidators;

        const existing = Api.getSession();
        if (existing) {
          location.href =
            existing.role === 'admin' ? 'admin.html' : 'applications.html';
        }

        const form = document.getElementById('login-form');
        const loginInput = document.getElementById('login');
        const passwordInput = document.getElementById('password');
        const submit = document.getElementById('submit-btn');

        const checkLogin = V.bind(loginInput, (v) =>
          v.trim() ? null : 'Введите логин'
        );
        const checkPwd = V.bind(passwordInput, (v) =>
          v ? null : 'Введите пароль'
        );

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const e1 = checkLogin();
          const e2 = checkPwd();
          if (e1 || e2) return;

          App.setButtonLoading(submit, true);
          try {
            const session = await Api.login(
              loginInput.value.trim(),
              passwordInput.value
            );
            App.toast(`Добро пожаловать, ${session.fio || session.login}!`, 'success');
            setTimeout(() => {
              location.href =
                session.role === 'admin' ? 'admin.html' : 'applications.html';
            }, 350);
          } catch (err) {
            App.setButtonLoading(submit, false);
            const errorEl = passwordInput.parentElement.querySelector('.field-error');
            if (errorEl) errorEl.textContent = err.message;
            passwordInput.classList.add('is-error');
            loginInput.classList.add('is-error');
            App.toast(err.message, 'error');
          }
        });
      })();
    </script>
  </body>
</html>
